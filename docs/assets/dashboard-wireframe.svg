<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-labelledby="wireframe-title wireframe-desc">
  <title id="wireframe-title">CCA-F Study Runtime Dashboard Wireframe — 7 Widgets</title>
  <desc id="wireframe-desc">Schematic wireframe of the seven-widget study dashboard. Top row: full-width pass/fail banner, then a 720-point progress bar. Middle row: domain breakdown bars (D1–D5), scenario breakdown, and weak concept tag list. Bottom row: lab progress with recommended-next, and score trend sparkline. Each widget is annotated with its HTML anchor ID.</desc>

  <defs>
    <style>
      .w-box    { fill:#E8E4DC; stroke:#1C2B2B; stroke-width:1.5; }
      .w-label  { font-family:'Georgia','Times New Roman',serif; font-size:12px; font-weight:bold; fill:#1C2B2B; }
      .w-id     { font-family:'Courier New','Courier',monospace; font-size:8.5px; fill:#C9622F; }
      .w-note   { font-family:'Georgia','Times New Roman',serif; font-size:9.5px; font-style:italic; fill:#555; }
      .bar-bg   { fill:#D4D0C8; rx:2; }
      .bar-fill { fill:#2D6A4F; rx:2; }
      .bar-rust { fill:#C9622F; rx:2; }
      .chrome   { fill:#1C2B2B; }
      .chrome-t { font-family:'Courier New','Courier',monospace; font-size:9px; fill:#8BA888; }
      .dim-lbl  { font-family:'Courier New','Courier',monospace; font-size:8px; fill:#1C2B2B; }
      .tick     { fill:#2D6A4F; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="#F5F2EC"/>
  <!-- Left accent rule -->
  <rect x="0" y="0" width="4" height="560" fill="#C9622F"/>
  <!-- Header -->
  <rect x="4" y="0" width="896" height="40" fill="#1C2B2B"/>
  <text x="20" y="25" font-family="'Georgia','Times New Roman',serif" font-size="14" font-weight="bold" fill="#F5F2EC">CCA-F Study Runtime · Dashboard Wireframe</text>
  <text x="730" y="25" font-family="'Courier New','Courier',monospace" font-size="10" fill="#8BA888">7 widgets · vanilla HTML/CSS/JS</text>

  <!-- ══ Browser chrome mockup ══ -->
  <rect x="20" y="50" width="860" height="24" rx="3" fill="#1C2B2B"/>
  <circle cx="38" cy="62" r="5" fill="#C9622F" opacity="0.7"/>
  <circle cx="54" cy="62" r="5" fill="#8BA888" opacity="0.7"/>
  <circle cx="70" cy="62" r="5" fill="#2D6A4F" opacity="0.7"/>
  <rect x="90" y="55" width="540" height="14" rx="2" fill="#2D6A4F" opacity="0.25"/>
  <text x="112" y="65" font-family="'Courier New','Courier',monospace" font-size="8" fill="#8BA888">http://localhost:8000/static/</text>
  <text x="750" y="65" font-family="'Courier New','Courier',monospace" font-size="8" fill="#8BA888">python -m http.server 8000 -d 06-dashboard</text>

  <!-- ══ WIDGET 1: Pass Banner (full width) ══ -->
  <rect x="20" y="82" width="860" height="56" rx="3" class="w-box"/>
  <!-- green fill bar to simulate pass state -->
  <rect x="20" y="82" width="860" height="56" rx="3" fill="#2D6A4F" opacity="0.12"/>
  <rect x="20" y="82" width="4" height="56" fill="#2D6A4F"/>
  <text x="50" y="114" class="w-label">PASS BANNER — Scaled Score · Pass/Fail · Gap to 720</text>
  <text x="760" y="96" text-anchor="middle" class="w-id">#pass-banner</text>
  <text x="760" y="110" text-anchor="middle" class="w-note">full-width · top of page</text>
  <!-- Mock score chips -->
  <rect x="580" y="90" width="60" height="20" rx="2" fill="#2D6A4F"/>
  <text x="610" y="104" text-anchor="middle" font-family="'Courier New','Courier',monospace" font-size="9" fill="#F5F2EC">820 / 1000</text>
  <rect x="648" y="90" width="38" height="20" rx="2" fill="#2D6A4F"/>
  <text x="667" y="104" text-anchor="middle" font-family="'Courier New','Courier',monospace" font-size="9" fill="#F5F2EC">PASS</text>
  <rect x="694" y="90" width="50" height="20" rx="2" fill="#8BA888"/>
  <text x="719" y="104" text-anchor="middle" font-family="'Courier New','Courier',monospace" font-size="9" fill="#1C2B2B">+100 gap</text>

  <!-- ══ WIDGET 2: 720 Progress Bar ══ -->
  <rect x="20" y="146" width="860" height="48" rx="3" class="w-box"/>
  <text x="36" y="165" class="w-label">Progress to 720</text>
  <text x="36" y="180" class="w-id">#pass-progress</text>
  <!-- Progress bar mockup -->
  <rect x="200" y="157" width="560" height="14" rx="2" fill="#D4D0C8"/>
  <rect x="200" y="157" width="399" height="14" rx="2" fill="#2D6A4F" opacity="0.85"/><!-- 820/1000 -->
  <!-- 720 marker -->
  <line x1="603" y1="153" x2="603" y2="175" stroke="#C9622F" stroke-width="1.5"/>
  <text x="603" y="150" text-anchor="middle" font-family="'Courier New','Courier',monospace" font-size="8" fill="#C9622F">720</text>
  <!-- current score marker -->
  <line x1="659" y1="153" x2="659" y2="175" stroke="#1C2B2B" stroke-width="1.5" stroke-dasharray="2,2"/>
  <text x="659" y="150" text-anchor="middle" font-family="'Courier New','Courier',monospace" font-size="8" fill="#1C2B2B">820</text>
  <text x="800" y="168" class="w-note">scaled 100–1000 scale</text>

  <!-- ══ ROW 2: three-column layout ══ -->
  <!-- WIDGET 3: Domain Breakdown (col 1, wide) -->
  <rect x="20" y="202" width="340" height="165" rx="3" class="w-box"/>
  <text x="36" y="222" class="w-label">Domain Breakdown</text>
  <text x="36" y="235" class="w-id">#domain-breakdown</text>
  <!-- D1–D5 bars -->
  <text x="36"  y="253" class="dim-lbl">D1 Agentic Arch.  27%</text>
  <rect x="195" y="244" width="140" height="10" rx="1" fill="#D4D0C8"/>
  <rect x="195" y="244" width="105" height="10" rx="1" fill="#2D6A4F" opacity="0.8"/>

  <text x="36"  y="271" class="dim-lbl">D2 Tool Design    18%</text>
  <rect x="195" y="262" width="140" height="10" rx="1" fill="#D4D0C8"/>
  <rect x="195" y="262" width="120" height="10" rx="1" fill="#2D6A4F" opacity="0.8"/>

  <text x="36"  y="289" class="dim-lbl">D3 Claude Code    20%</text>
  <rect x="195" y="280" width="140" height="10" rx="1" fill="#D4D0C8"/>
  <rect x="195" y="280" width="80"  height="10" rx="1" fill="#C9622F" opacity="0.8"/>

  <text x="36"  y="307" class="dim-lbl">D4 Prompt Eng.    20%</text>
  <rect x="195" y="298" width="140" height="10" rx="1" fill="#D4D0C8"/>
  <rect x="195" y="298" width="130" height="10" rx="1" fill="#2D6A4F" opacity="0.8"/>

  <text x="36"  y="325" class="dim-lbl">D5 Context Mgmt   15%</text>
  <rect x="195" y="316" width="140" height="10" rx="1" fill="#D4D0C8"/>
  <rect x="195" y="316" width="95"  height="10" rx="1" fill="#2D6A4F" opacity="0.8"/>

  <text x="36" y="355" class="w-note">bars show accuracy per domain</text>

  <!-- WIDGET 4: Scenario Breakdown (col 2) -->
  <rect x="368" y="202" width="250" height="165" rx="3" class="w-box"/>
  <text x="384" y="222" class="w-label">Scenario Breakdown</text>
  <text x="384" y="235" class="w-id">#scenario-breakdown</text>
  <!-- scenario rows (placeholder) -->
  <line x1="384" y1="242" x2="608" y2="242" stroke="#1C2B2B" stroke-width="0.5" opacity="0.2"/>
  <rect x="384" y="248" width="224" height="10" rx="1" fill="#D4D0C8"/>
  <rect x="384" y="248" width="180" height="10" rx="1" fill="#8BA888" opacity="0.9"/>
  <rect x="384" y="264" width="224" height="10" rx="1" fill="#D4D0C8"/>
  <rect x="384" y="264" width="140" height="10" rx="1" fill="#8BA888" opacity="0.9"/>
  <rect x="384" y="280" width="224" height="10" rx="1" fill="#D4D0C8"/>
  <rect x="384" y="280" width="100" height="10" rx="1" fill="#C9622F" opacity="0.7"/>
  <rect x="384" y="296" width="224" height="10" rx="1" fill="#D4D0C8"/>
  <rect x="384" y="296" width="190" height="10" rx="1" fill="#8BA888" opacity="0.9"/>
  <rect x="384" y="312" width="224" height="10" rx="1" fill="#D4D0C8"/>
  <rect x="384" y="312" width="160" height="10" rx="1" fill="#8BA888" opacity="0.9"/>
  <text x="384" y="355" class="w-note">accuracy per scenario type</text>

  <!-- WIDGET 5: Weak Concepts (col 3) -->
  <rect x="626" y="202" width="254" height="165" rx="3" class="w-box"/>
  <text x="642" y="222" class="w-label">Weak Concepts</text>
  <text x="642" y="235" class="w-id">#weak-concepts</text>
  <!-- tag cloud placeholder -->
  <rect x="642" y="243" width="90" height="16" rx="8" fill="#C9622F" opacity="0.2" stroke="#C9622F" stroke-width="1"/>
  <text x="687" y="255" text-anchor="middle" font-family="'Courier New','Courier',monospace" font-size="8" fill="#C9622F">MCP schemas</text>
  <rect x="740" y="243" width="80" height="16" rx="8" fill="#C9622F" opacity="0.2" stroke="#C9622F" stroke-width="1"/>
  <text x="780" y="255" text-anchor="middle" font-family="'Courier New','Courier',monospace" font-size="8" fill="#C9622F">tool design</text>
  <rect x="642" y="266" width="70" height="16" rx="8" fill="#C9622F" opacity="0.15" stroke="#C9622F" stroke-width="0.75"/>
  <text x="677" y="278" text-anchor="middle" font-family="'Courier New','Courier',monospace" font-size="8" fill="#C9622F">CLAUDE.md</text>
  <rect x="720" y="266" width="100" height="16" rx="8" fill="#C9622F" opacity="0.15" stroke="#C9622F" stroke-width="0.75"/>
  <text x="770" y="278" text-anchor="middle" font-family="'Courier New','Courier',monospace" font-size="8" fill="#C9622F">context window</text>
  <rect x="642" y="289" width="85" height="16" rx="8" fill="#8BA888" opacity="0.3" stroke="#8BA888" stroke-width="0.75"/>
  <text x="684" y="301" text-anchor="middle" font-family="'Courier New','Courier',monospace" font-size="8" fill="#1C2B2B">agent loops</text>
  <rect x="735" y="289" width="95" height="16" rx="8" fill="#8BA888" opacity="0.3" stroke="#8BA888" stroke-width="0.75"/>
  <text x="782" y="301" text-anchor="middle" font-family="'Courier New','Courier',monospace" font-size="8" fill="#1C2B2B">orchestration</text>
  <text x="642" y="355" class="w-note">tags from missed questions</text>

  <!-- ══ ROW 3: two-column layout ══ -->
  <!-- WIDGET 6: Lab Progress (left, wide) -->
  <rect x="20" y="375" width="540" height="120" rx="3" class="w-box"/>
  <text x="36" y="395" class="w-label">Lab Progress + Recommended Next</text>
  <text x="36" y="408" class="w-id">#lab-progress</text>
  <!-- Lab rows -->
  <line x1="36" y1="415" x2="548" y2="415" stroke="#1C2B2B" stroke-width="0.5" opacity="0.2"/>
  <!-- lab items -->
  <rect x="36"  y="420" width="12" height="12" rx="2" fill="#2D6A4F"/>
  <text x="55"  y="431" class="dim-lbl">Lab 1: Validate question bank</text>
  <text x="530" y="431" text-anchor="end" font-family="'Courier New','Courier',monospace" font-size="8" fill="#2D6A4F">DONE</text>

  <rect x="36"  y="438" width="12" height="12" rx="2" fill="#2D6A4F"/>
  <text x="55"  y="449" class="dim-lbl">Lab 2: Submit + score attempt</text>
  <text x="530" y="449" text-anchor="end" font-family="'Courier New','Courier',monospace" font-size="8" fill="#2D6A4F">DONE</text>

  <rect x="36"  y="456" width="12" height="12" rx="2" fill="#D4D0C8" stroke="#8BA888" stroke-width="1"/>
  <text x="55"  y="467" class="dim-lbl">Lab 3: Export dashboard data</text>
  <text x="530" y="467" text-anchor="end" font-family="'Courier New','Courier',monospace" font-size="8" fill="#C9622F">NEXT →</text>

  <rect x="36"  y="474" width="12" height="12" rx="2" fill="#D4D0C8" stroke="#1C2B2B" stroke-width="0.75" opacity="0.4"/>
  <text x="55"  y="485" class="dim-lbl">Lab 4: Extend question bank</text>
  <text x="530" y="485" text-anchor="end" font-family="'Courier New','Courier',monospace" font-size="8" fill="#8BA888">pending</text>

  <!-- recommended_next callout -->
  <rect x="36" y="490" width="502" height="0.75" fill="#1C2B2B" opacity="0.15"/>
  <text x="36" y="488" class="w-note">recommended_next: Lab 3 (see lab-status.json)</text>

  <!-- WIDGET 7: Score Trend (right) -->
  <rect x="568" y="375" width="312" height="120" rx="3" class="w-box"/>
  <text x="584" y="395" class="w-label">Score Trend</text>
  <text x="584" y="408" class="w-id">#score-trend</text>
  <!-- Sparkline mock -->
  <line x1="584" y1="420" x2="864" y2="420" stroke="#1C2B2B" stroke-width="0.5" opacity="0.2"/>
  <!-- Y axis -->
  <line x1="600" y1="422" x2="600" y2="470" stroke="#1C2B2B" stroke-width="0.75" opacity="0.35"/>
  <!-- 720 pass-mark line -->
  <line x1="600" y1="452" x2="862" y2="452" stroke="#C9622F" stroke-width="0.75" stroke-dasharray="3,2"/>
  <text x="866" y="455" font-family="'Courier New','Courier',monospace" font-size="7.5" fill="#C9622F">720</text>
  <!-- sparkline polyline (schematic scores: 680, 700, 750, 780, 820) -->
  <polyline points="620,462 660,458 700,445 740,440 800,432"
            fill="none" stroke="#2D6A4F" stroke-width="2" stroke-linejoin="round"/>
  <!-- dots -->
  <circle cx="620" cy="462" r="3" fill="#C9622F"/>
  <circle cx="660" cy="458" r="3" fill="#C9622F"/>
  <circle cx="700" cy="445" r="3" fill="#2D6A4F"/>
  <circle cx="740" cy="440" r="3" fill="#2D6A4F"/>
  <circle cx="800" cy="432" r="3.5" fill="#2D6A4F" stroke="#1C2B2B" stroke-width="1"/>
  <!-- x-axis attempt labels -->
  <text x="620" y="480" text-anchor="middle" font-family="'Courier New','Courier',monospace" font-size="7.5" fill="#555">T-4</text>
  <text x="660" y="480" text-anchor="middle" font-family="'Courier New','Courier',monospace" font-size="7.5" fill="#555">T-3</text>
  <text x="700" y="480" text-anchor="middle" font-family="'Courier New','Courier',monospace" font-size="7.5" fill="#555">T-2</text>
  <text x="740" y="480" text-anchor="middle" font-family="'Courier New','Courier',monospace" font-size="7.5" fill="#555">T-1</text>
  <text x="800" y="480" text-anchor="middle" font-family="'Courier New','Courier',monospace" font-size="7.5" fill="#1C2B2B">latest</text>
  <text x="584" y="488" class="w-note">scaled score per attempt · pass mark shown in rust</text>

  <!-- ══ Footer ══ -->
  <line x1="20" y1="506" x2="880" y2="506" stroke="#1C2B2B" stroke-width="0.5" opacity="0.25"/>
  <text x="20" y="520" font-family="'Georgia','Times New Roman',serif" font-size="9" fill="#555" font-style="italic">Widget anchors: </text>
  <text x="110" y="520" font-family="'Courier New','Courier',monospace" font-size="8.5" fill="#C9622F">#pass-banner · #pass-progress · #domain-breakdown · #scenario-breakdown · #weak-concepts · #lab-progress · #score-trend</text>
  <text x="20" y="535" font-family="'Georgia','Times New Roman',serif" font-size="9" fill="#555" font-style="italic">Served by: python -m http.server 8000 -d 06-dashboard  ·  No build step  ·  Vanilla HTML/CSS/JS</text>
  <text x="20" y="550" font-family="'Georgia','Times New Roman',serif" font-size="9" fill="#555" font-style="italic">Source: 06-dashboard/static/index.html  ·  Data: 06-dashboard/data/dashboard-data.json</text>
</svg>
